name: ci

on:
    push:
        branches:
            - main
            - feature/**
    pull_request:
        branches:
            - main

env:
    DLCPU_ONNXRUNTIME_VERSION: 1.22.0
    DLCPU_VCPKG_COMMIT: 256acc64012b23a13041d8705805e1f23b43a024

jobs:
    windows-build:
        runs-on: windows-2022
        strategy:
            fail-fast: false
            matrix:
                include:
                    - platform: x86
                      config: Debug
                      cmake_arch: Win32
                      msvc_arch: x86
                      triplet: x86-windows
                      host_triplet: x64-windows
                      build_dir: build/x86
                    - platform: x86
                      config: Release
                      cmake_arch: Win32
                      msvc_arch: x86
                      triplet: x86-windows
                      host_triplet: x64-windows
                      build_dir: build/x86
                    - platform: x64
                      config: Debug
                      cmake_arch: x64
                      msvc_arch: x64
                      triplet: x64-windows
                      host_triplet: x64-windows
                      build_dir: build/x64
                    - platform: x64
                      config: Release
                      cmake_arch: x64
                      msvc_arch: x64
                      triplet: x64-windows
                      host_triplet: x64-windows
                      build_dir: build/x64

        env:
            VCPKG_BINARY_SOURCES: clear;x-gha,readwrite
            VCPKG_DEFAULT_TRIPLET: ${{ matrix.triplet }}
            VCPKG_DEFAULT_HOST_TRIPLET: ${{ matrix.host_triplet }}

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Configure MSVC v142 environment
              uses: ilammy/msvc-dev-cmd@v1
              with:
                  arch: ${{ matrix.msvc_arch }}
                  toolset: 14.29
                  vsversion: 2022

            - name: Prepare cache directories
              shell: pwsh
              run: |
                  New-Item -ItemType Directory -Force -Path '${{ github.workspace }}/.cache/vcpkg-binary' | Out-Null
                  New-Item -ItemType Directory -Force -Path '${{ github.workspace }}/.cache/fetchcontent' | Out-Null

            - name: Setup vcpkg
              uses: lukka/run-vcpkg@v11.5
              with:
                  vcpkgDirectory: ${{ github.workspace }}/vcpkg
                  vcpkgGitCommitId: ${{ env.DLCPU_VCPKG_COMMIT }}
                  doNotCache: false
                  binaryCachePath: ${{ github.workspace }}/.cache/vcpkg-binary

            - name: Cache ONNX Runtime NuGet
              uses: actions/cache@v4
              with:
                  path: .cache/fetchcontent
                  key: ${{ runner.os }}-onnxruntime-${{ env.DLCPU_ONNXRUNTIME_VERSION }}

            - name: Configure CMake
              shell: pwsh
              run: |
                  $buildDir = '${{ matrix.build_dir }}'
                  $toolchainFile = Join-Path '${{ github.workspace }}' 'vcpkg/scripts/buildsystems/vcpkg.cmake'
                  $commonArgs = @(
                      '-S', '.',
                      '-B', $buildDir,
                      '-A', '${{ matrix.cmake_arch }}',
                      "-DCMAKE_TOOLCHAIN_FILE=$toolchainFile",
                      '-DVCPKG_TARGET_TRIPLET=${{ matrix.triplet }}'
                  )

                  & cmake -G 'Visual Studio 16 2019' @commonArgs
                  if ($LASTEXITCODE -ne 0) {
                      Remove-Item -LiteralPath $buildDir -Recurse -Force -ErrorAction SilentlyContinue
                      & cmake -G 'Visual Studio 17 2022' -T 'v142' @commonArgs
                  }

                  if ($LASTEXITCODE -ne 0) {
                      throw 'CMake configure failed for both Visual Studio generators.'
                  }

            - name: Build
              run: cmake --build ${{ matrix.build_dir }} --config ${{ matrix.config }} --parallel

            - name: Run tests
              run: ctest --test-dir ${{ matrix.build_dir }} -C ${{ matrix.config }} --output-on-failure

            - name: Validate exports
              shell: pwsh
              run: |
                  $dllPath = Join-Path $PWD '${{ matrix.build_dir }}/${{ matrix.config }}/dl_cpu.dll'
                  $dumpbinOutput = & dumpbin /exports $dllPath
                  $dumpbinOutput | ForEach-Object { $_ }

                  $exportNames = @()
                  foreach ($line in $dumpbinOutput) {
                      if ($line -match '^\s+\d+\s+[0-9A-F]+\s+[0-9A-F]+\s+(.+)$') {
                          $candidate = $matches[1].Trim()
                          if ($candidate -ne '[NONAME]') {
                              $exportNames += $candidate
                          }
                      }
                  }

                  $expected = @(
                      'DLCPU_GetLastErrorMessage'
                      'DLCPU_GetVersion'
                  )

                  $unexpected = Compare-Object -ReferenceObject ($expected | Sort-Object) -DifferenceObject ($exportNames | Sort-Object)
                  if ($unexpected) {
                      throw "Unexpected export list: $($exportNames -join ', ')"
                  }

                  if ($exportNames | Where-Object { $_ -match '[?@]' }) {
                      throw "Decorated export detected: $($exportNames -join ', ')"
                  }

            - name: Audit direct runtime dependencies
              shell: pwsh
              run: |
                  $dllPath = Join-Path $PWD '${{ matrix.build_dir }}/${{ matrix.config }}/dl_cpu.dll'
                  $dumpbinOutput = & dumpbin /dependents $dllPath
                  $dumpbinOutput | ForEach-Object { $_ }

                  $directDependents = @()
                  $capture = $false
                  foreach ($line in $dumpbinOutput) {
                      if ($line -match 'Image has the following dependencies:') {
                          $capture = $true
                          continue
                      }

                      if ($capture -and $line -match '^\s*$') {
                          break
                      }

                      if ($capture) {
                          $candidate = $line.Trim()
                          if ($candidate) {
                              $directDependents += $candidate
                          }
                      }
                  }

                  $allowedPatterns = @(
                      '^KERNEL32\.dll$'
                      '^onnxruntime\.dll$'
                      '^opencv_world\d+\.dll$'
                      '^MSVCP140(?:_\d+)?\.dll$'
                      '^CONCRT140(?:_\d+)?\.dll$'
                      '^VCRUNTIME140(?:_1)?\.dll$'
                      '^api-ms-win-.*\.dll$'
                  )

                  $unexpected = @()
                  foreach ($dependent in $directDependents) {
                      $isAllowed = $false
                      foreach ($pattern in $allowedPatterns) {
                          if ($dependent -imatch $pattern) {
                              $isAllowed = $true
                              break
                          }
                      }

                      if (-not $isAllowed) {
                          $unexpected += $dependent
                      }
                  }

                  if ($unexpected.Count -gt 0) {
                      throw "Unexpected runtime dependency detected: $($unexpected -join ', ')"
                  }

            - name: Upload artifact
              uses: actions/upload-artifact@v4
              with:
                  name: dl_cpu-${{ matrix.platform }}-${{ matrix.config }}
                  path: ${{ matrix.build_dir }}/${{ matrix.config }}
                  if-no-files-found: error
